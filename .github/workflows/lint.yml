name: Lint

# Déclenché sur tout push et toute PR, quelle que soit la branche ou le chemin.
# Biome est rapide (<30 s) — aucun filtre de chemin nécessaire.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  biome:
    name: Biome CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-lint-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-lint-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # biome ci = read-only (pas de --write), sort avec code 1 si violation.
      # --reporter=github émet des annotations dans la diff de la PR.
      - name: Biome CI
        run: bunx biome ci --reporter=github

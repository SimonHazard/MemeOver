name: Bot CI

# Déclenché uniquement quand des fichiers du bot ou du Dockerfile changent.
on:
  push:
    branches:
      - main
    paths:
      - "bot/**"
      - "Dockerfile.bot"
      - ".github/workflows/bot.yml"
  pull_request:
    paths:
      - "bot/**"
      - "Dockerfile.bot"
      - ".github/workflows/bot.yml"

jobs:
  # ── Type-check (toutes les PR et tous les pushes) ────────────────────────────
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            bot/node_modules
          key: bun-bot-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-bot-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # tsconfig.json est dans bot/ — tsc doit être exécuté depuis ce répertoire
      - name: Type-check bot
        working-directory: bot
        run: bunx tsc --noEmit

  # ── Docker build + push (merge sur main uniquement) ──────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: typecheck
    # Le build Docker ne tourne que si le type-check passe ET qu'on est sur main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write # requis pour pousser sur ghcr.io avec GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/memeover-bot
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache des couches Docker dans le cache GitHub Actions (GHA)
          cache-from: type=gha
          cache-to: type=gha,mode=max
